[theme]
# Neutral light defaults — appearance is driven by `assets/style.css` + in-app theme toggle.
# Keeping base "light" avoids Streamlit's dark shell overriding CSS variable injection.
base = "light"
primaryColor = "#0D9488"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F8FAFC"
textColor = "#0F172A"
font = "sans serif"

[server]
maxUploadSize = 50
enableXsrfProtection = true

[browser]
gatherUsageStats = false
